services:
  postgres:
    image: postgres:17
    container_name: cosmetics-lens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cosmetics
      POSTGRES_PASSWORD: cosmetics
      POSTGRES_DB: cosmetics_lens
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmetics -d cosmetics_lens"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cosmetics-lens-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
